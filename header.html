<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1500" height="500" fill="#0d1117"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="1500" y2="100" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="0" y1="200" x2="1500" y2="200" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="0" y1="300" x2="1500" y2="300" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="0" y1="400" x2="1500" y2="400" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="300" y1="0" x2="300" y2="500" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="900" y1="0" x2="900" y2="500" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
  <line x1="1200" y1="0" x2="1200" y2="500" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>

  <!-- Right side: abstract CLV chart line (simulated upward trend) -->
  <polyline
    points="900,400 960,370 1010,380 1070,340 1120,320 1180,290 1230,270 1290,230 1340,200 1400,160 1450,130 1500,100"
    fill="none"
    stroke="#3fb950"
    stroke-width="2.5"
    stroke-opacity="0.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Chart area fill under the line -->
  <polygon
    points="900,400 960,370 1010,380 1070,340 1120,320 1180,290 1230,270 1290,230 1340,200 1400,160 1450,130 1500,100 1500,500 900,500"
    fill="#3fb950"
    fill-opacity="0.05"
  />

  <!-- Diagonal accent slashes (top right) -->
  <line x1="1050" y1="0" x2="1150" y2="500" stroke="#3fb950" stroke-width="1.5" stroke-opacity="0.12"/>
  <line x1="1100" y1="0" x2="1200" y2="500" stroke="#3fb950" stroke-width="1" stroke-opacity="0.07"/>
  <line x1="1150" y1="0" x2="1250" y2="500" stroke="#3fb950" stroke-width="1" stroke-opacity="0.05"/>

  <!-- Data point dots on chart -->
  <circle cx="1070" cy="340" r="4" fill="#3fb950" opacity="0.7"/>
  <circle cx="1180" cy="290" r="4" fill="#3fb950" opacity="0.7"/>
  <circle cx="1290" cy="230" r="4" fill="#3fb950" opacity="0.7"/>
  <circle cx="1400" cy="160" r="4" fill="#3fb950" opacity="0.7"/>

  <!-- Left: SharpSide wordmark -->
  <text
    x="90"
    y="250"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="120"
    font-weight="800"
    fill="#e6edf3"
    letter-spacing="-4"
  >Sharp<tspan fill="#3fb950">Side</tspan></text>

  <!-- Tagline -->
  <text
    x="94"
    y="310"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#8b949e"
    letter-spacing="2"
  >Sharp lines. Proven edge.</text>

  <!-- Thin green rule under wordmark -->
  <line x1="90" y1="328" x2="620" y2="328" stroke="#3fb950" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Bottom left: stat chips -->
  <rect x="90" y="370" width="160" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="388" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">BEAT THE CLOSE</text>
  <text x="110" y="406" font-family="-apple-system, Arial, sans-serif" font-size="16" font-weight="700" fill="#3fb950">100%</text>

  <rect x="264" y="370" width="160" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="284" y="388" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">AVG CLV</text>
  <text x="284" y="406" font-family="-apple-system, Arial, sans-serif" font-size="16" font-weight="700" fill="#3fb950">+7.12%</text>

  <rect x="438" y="370" width="160" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="458" y="388" font-family="-apple-system, Arial, sans-serif" font-size="11" fill="#8b949e" letter-spacing="1">SPORTSBOOK + KALSHI</text>
  <text x="458" y="406" font-family="-apple-system, Arial, sans-serif" font-size="16" font-weight="700" fill="#e6edf3">Both</text>

</svg>
</body>
</html>
