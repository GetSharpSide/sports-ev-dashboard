<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: #555; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
</style>
</head>
<body>
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#0d1117" rx="0"/>

  <!-- Sharp diagonal accent line (top-right to bottom-left, behind S) -->
  <line x1="260" y1="60" x2="140" y2="310" stroke="#3fb950" stroke-width="2.5" stroke-opacity="0.35"/>

  <!-- Second parallel line for depth -->
  <line x1="280" y1="60" x2="160" y2="310" stroke="#3fb950" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Bold S lettermark -->
  <text
    x="200"
    y="230"
    text-anchor="middle"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="210"
    font-weight="800"
    fill="#3fb950"
    letter-spacing="-8"
  >S</text>

  <!-- Small green horizontal rule -->
  <line x1="130" y1="292" x2="270" y2="292" stroke="#3fb950" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- SHARPSIDE wordmark -->
  <text
    x="200"
    y="318"
    text-anchor="middle"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="600"
    fill="#3fb950"
    letter-spacing="7"
    opacity="0.85"
  >SHARPSIDE</text>
</svg>
</body>
</html>
